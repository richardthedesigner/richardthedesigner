<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Richard Murphy — Index / Smalt prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F7F6F2; --paper-2:#EEEDE7; --ink:#14151A; --soft:#5B5C63;
    --line:#D9D7CF; --smalt:#1A46F0; --smalt-deep:#1438C2; --smalt-line:#3D62F4;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--paper);color:var(--ink);font-family:"IBM Plex Sans",system-ui,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.45}
  a{color:inherit;text-decoration:none}
  .mono{font-family:"IBM Plex Mono",monospace}
  img{display:block;width:100%;height:100%;object-fit:cover}

  /* ---------------- HOME: smalt split ---------------- */
  #home{display:grid;grid-template-columns:minmax(360px,38%) 1fr;min-height:100vh}
  #home.hidden{display:none}

  .mast{background:var(--smalt);color:var(--paper);padding:34px 34px 28px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column}
  .mast .top{display:flex;gap:20px;align-items:baseline;font-family:"IBM Plex Mono",monospace;font-size:12px;color:rgba(255,255,255,.72);letter-spacing:.03em}
  .mast .top .logo{font-family:"IBM Plex Sans",sans-serif;font-weight:700;font-size:14px;letter-spacing:-.01em;color:#fff}
  .mast .top nav{margin-left:auto;display:flex;gap:16px}
  .mast .top nav a{cursor:pointer}
  .mast .top nav a:hover{color:#fff}

  .sentence{margin-top:42px;font-size:clamp(28px,3.4vw,46px);font-weight:600;letter-spacing:-.02em;line-height:1.14}
  .sentence .lead{color:rgba(255,255,255,.9)}
  .sv{cursor:pointer;color:#fff;border-bottom:2px solid rgba(255,255,255,.32);transition:.14s;white-space:nowrap}
  .sv:hover{border-bottom-color:#fff}
  .sv.sel{background:#fff;color:var(--smalt);border-radius:6px;padding:0 9px;border-bottom-color:transparent}
  .slash{color:rgba(255,255,255,.5);padding:0 2px}

  .mast .blurb{margin-top:26px;max-width:36ch;font-size:15px;color:rgba(255,255,255,.82)}
  .mast .foot{margin-top:auto;display:flex;flex-direction:column;gap:4px;font-family:"IBM Plex Mono",monospace;font-size:11.5px;color:rgba(255,255,255,.7)}
  .mast .foot .count{color:#fff}

  .gridwrap{min-height:100vh}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);grid-auto-rows:minmax(220px,1fr)}
  .cell{position:relative;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:14px 16px;display:flex;flex-direction:column;cursor:pointer;background:var(--paper);transition:background .12s,color .12s;overflow:hidden}
  .cell:hover{background:var(--smalt);color:#fff}
  .cell .num{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--soft)}
  .cell:hover .num{color:rgba(255,255,255,.75)}
  .cell .t{margin-top:auto;font-size:18px;font-weight:600;letter-spacing:-.012em}
  .cell .s{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--soft);margin-top:4px}
  .cell:hover .s{color:rgba(255,255,255,.82)}
  .cell .go{position:absolute;top:13px;right:15px;font-family:"IBM Plex Mono",monospace;font-size:12px;opacity:0;transition:.14s;color:#fff}
  .cell:hover .go{opacity:1}
  .cell.dim{opacity:.26;pointer-events:none}

  /* ---------------- DETAIL ---------------- */
  #detail{display:none}
  #detail.show{display:block}
  .dbar{position:sticky;top:0;z-index:20;background:rgba(247,246,242,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:13px 28px;display:flex;align-items:center;gap:18px}
  .dbar a.back{font-family:"IBM Plex Mono",monospace;font-size:12.5px;color:var(--smalt);cursor:pointer}
  .dbar a.back:hover{text-decoration:underline}
  .dbar .crumb{font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--soft);margin-left:auto}

  .dhead{max-width:1100px;margin:0 auto;padding:48px 28px 26px}
  .dhead .kind{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--smalt)}
  .dhead h1{margin-top:12px;font-size:clamp(34px,5vw,64px);font-weight:600;letter-spacing:-.03em;line-height:1.02}
  .dhead .stand{margin-top:18px;max-width:60ch;font-size:clamp(17px,1.7vw,21px);color:var(--soft);line-height:1.5}
  .dmeta{max-width:1100px;margin:0 auto;padding:0 28px 22px;display:flex;flex-wrap:wrap;gap:28px;border-bottom:1px solid var(--line)}
  .dmeta .m .k{font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft)}
  .dmeta .m .v{font-size:15px;font-weight:500;margin-top:3px}
  .dtags{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
  .dtags .tag{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--smalt);border:1px solid var(--smalt);border-radius:999px;padding:3px 10px}

  .hero{max-width:1100px;margin:30px auto;padding:0 28px}
  .hero .frame{aspect-ratio:16/8;background:linear-gradient(135deg,var(--smalt),var(--smalt-deep));border-radius:6px;overflow:hidden}

  .metrics{max-width:1100px;margin:0 auto 8px;padding:6px 28px 30px;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:22px;border-bottom:1px solid var(--line)}
  .metrics .mx .val{font-size:clamp(28px,3.4vw,44px);font-weight:700;letter-spacing:-.02em;color:var(--smalt)}
  .metrics .mx .lab{font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--soft);margin-top:2px}

  .body{max-width:720px;margin:0 auto;padding:40px 28px 20px}
  .body h2{font-size:24px;font-weight:600;letter-spacing:-.01em;margin:34px 0 12px;color:var(--ink)}
  .body h2:first-child{margin-top:0}
  .body p{font-size:17px;line-height:1.68;color:#26272E;margin-bottom:16px}
  .body .note{font-family:"IBM Plex Mono",monospace;font-size:12.5px;color:var(--soft);background:var(--paper-2);border-left:2px solid var(--smalt);padding:10px 14px;margin:18px 0}

  .gallery{max-width:1100px;margin:18px auto;padding:0 28px;display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  .gallery .g{aspect-ratio:4/3;background:linear-gradient(135deg,var(--paper-2),#dcdad2);border-radius:5px;overflow:hidden}

  .dnav{max-width:1100px;margin:30px auto 60px;padding:24px 28px;border-top:1px solid var(--line);display:flex;justify-content:space-between;font-family:"IBM Plex Mono",monospace;font-size:13px}
  .dnav a{cursor:pointer;color:var(--smalt)}
  .dnav a:hover{text-decoration:underline}

  @media(max-width:860px){
    #home{grid-template-columns:1fr}
    .mast{position:static;height:auto}
    .grid{grid-template-columns:repeat(2,1fr)}
    .gallery{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<!-- ============ HOME ============ -->
<main id="home">
  <aside class="mast">
    <div class="top">
      <span class="logo">Richard Murphy</span>
      <nav>
        <a onclick="go('')">Index</a>
        <a onclick="go('thinking/why-design-systems-fail')">Thinking</a>
        <a onclick="go('about')">About</a>
      </nav>
    </div>

    <div class="sentence" id="sentence">
      <span class="lead">Show me how I </span><span class="sv sel" data-f="all">work</span><span class="slash">/</span><span class="sv" data-f="platform">run platforms</span><span class="slash">/</span><span class="sv" data-f="ai">build with AI</span><span class="slash">/</span><span class="sv" data-f="systems">make systems</span><span class="slash">/</span><span class="sv" data-f="brand">shape brands</span><span class="lead">.</span>
    </div>

    <p class="blurb">Platforms operated at global scale. Systems built to be AI-native. Twelve years of making the thing, by hand.</p>

    <div class="foot">
      <span class="count" id="count"></span>
      <span>richardthedesigner.com</span>
      <span>richard@tigerforest.co.uk</span>
    </div>
  </aside>

  <section class="gridwrap">
    <div class="grid" id="grid"></div>
  </section>
</main>

<!-- ============ DETAIL ============ -->
<article id="detail">
  <div class="dbar">
    <a class="back" onclick="go('')">← Index</a>
    <span class="crumb" id="crumb"></span>
  </div>
  <div id="detailBody"></div>
</article>

<script>
/* ---------------- data ---------------- */
const UNS = id => `https://images.unsplash.com/photo-${id}?w=1400&q=80&auto=format&fit=crop`;

const works = [
  {n:"01", t:"Access Evo", slug:"access-evo", s:"Platform design system", type:"caseStudy", f:["platform","systems"]},
  {n:"02", t:"QikServe Kiosk", slug:"qikserve-kiosk", s:"Self-service at scale", type:"caseStudy", f:["platform","systems"]},
  {n:"03", t:"Prepay × QikServe", slug:"prepay-qikserve", s:"Post-merger fusion", type:"caseStudy", f:["platform"]},
  {n:"04", t:"Access Kiosk Pocket", slug:"access-kiosk-pocket", s:"Kiosk in your hand", type:"caseStudy", f:["platform","ai"]},
  {n:"05", t:"EvoGuest DS", slug:"evoguest-ds", s:"Hospitality system", type:"caseStudy", f:["systems"]},
  {n:"06", t:"Orson", slug:"orson", s:"AI-native venture", type:"caseStudy", f:["ai","systems"]},
  {n:"07", t:"GDK Go-Live", slug:"gdk-go-live", s:"Estate-wide rollout", type:"caseStudy", f:["platform"]},
  {n:"08", t:"Quoin", slug:"quoin", s:"Systems advisory", type:"caseStudy", f:["systems"]},
  {n:"09", t:"The Brotique", slug:"the-brotique", s:"Commerce & editorial", type:"project", f:["brand","ai"]},
  {n:"10", t:"Strunk", slug:"strunk", s:"Editorial system", type:"project", f:["brand","systems"]},
  {n:"11", t:"iAmHere", slug:"iamhere", s:"Presence, reimagined", type:"project", f:["ai","brand"]},
  {n:"12", t:"Realise Offices", slug:"realise-offices", s:"Spatial brand system", type:"project", f:["brand"]},
];

const TAGLABEL = {operate:"Operate", platform:"Run platforms", ai:"Build with AI", systems:"Make systems", brand:"Shape brands"};

const content = {
  "qikserve-kiosk": {
    kind:"Case study", type:"caseStudy", title:"QikServe Kiosk",
    stand:"Self-service ordering built for high-volume hospitality, designed to feel brand-specific, stay accessible, and hold up under real operational pressure at global scale.",
    meta:{Client:"QikServe / Access Group", Role:"Head of Product Design", Timeframe:"2018–2024", Sector:"Hospitality technology"},
    tags:["platform","systems"],
    hero:"1414235077428-338989a2e8c0",
    metrics:[["8,000+","locations"],["42","countries"],["130+","integrations"],["$1bn+","value handled"]],
    sections:[
      {h:"Context", p:["QikServe builds the self-service ordering layer for hospitality. The kiosk is the most demanding surface in that estate: a single product deployed across thousands of venues, dozens of brands, and dozens of countries, each with its own menu logic, payment setup, and operational habits.","The platform it sits within supports more than 8,000 locations across 42 countries, with over 130 integrations and more than a billion in value handled. The kiosk is not a one-off interface. It is a configurable product that has to behave correctly for a global coffee chain and an independent operator from the same codebase."]},
      {h:"Problem", p:["White-label kiosks tend to fail in one of two directions. They either collapse into a generic template that no brand wants to put its name on, or they fragment into bespoke builds that cannot be maintained. Neither scales.","The kiosk also carries an unusually high trust burden. It takes payment, handles allergen and dietary information, verifies age for alcohol, and does it all without a member of staff present. Any ambiguity in the interface becomes an operational problem at the worst possible moment, with a queue building behind the screen."]},
      {h:"Constraints", p:["Every decision had to survive contact with real operations: legacy POS integrations, peripheral hardware, intermittent connectivity, accessibility legislation across regions, and brand guidelines that ranged from a loose steer to a strict system.","Accessibility was a hard requirement, not a finishing pass. The kiosk had to meet ADA and WCAG expectations as a physical and digital product at once, which shapes everything from reach and contrast to focus order and error recovery."]},
      {h:"Structural model", p:["The answer was to treat the kiosk as a system of configurable behaviours rather than a fixed screen. Menu architecture, modifiers, basket logic, payment, loyalty, tipping, charity donation, age verification, and attract screens were each modelled as components an operator could turn on, restyle, and arrange without touching code.","Brand expression was scoped deliberately. Operators control styling, imagery, and tone within a structure that guarantees the journey still works. The system flexes on surface and holds firm on flow."]},
      {h:"Solution", p:["The guest journey was built around clarity under pressure: a strong attract screen, a legible menu structure that copes with deep modifier trees, predictable basket behaviour, and a payment flow that earns trust without staff mediation.","Complex cases were handled as first-class parts of the design rather than exceptions. Coffee customisation, pizza builds, alcohol verification, tipping, and charity prompts each had a defined pattern, so adding them to a deployment did not break the rest of the experience."]},
      {h:"Outcomes", p:["The kiosk became the flagship surface of a platform operating across 8,000+ locations and 42 countries, deployed by major global brands alongside independents from the same configurable base.","Accessibility leadership on the kiosk raised the standard across the wider product estate, making participation a design default rather than a retrofit."]},
      {h:"Strategic impact", p:["The work showed that white-label does not have to mean generic. A well-structured system let QikServe sell brand-specific experiences at scale without taking on bespoke maintenance, which is a commercial position as much as a design one."]},
    ],
    gallery:["1559339352-11d035aa65de","1517248135467-4c7edcad34c4"],
  },

  "orson": {
    kind:"Case study", type:"caseStudy", title:"Orson",
    stand:"An AI-native venture exploring agent-based workflows, automation and decision support, built independently to turn raw model capability into usable product.",
    meta:{Client:"Independent venture", Role:"Founder", Timeframe:"2023–", Sector:"Applied AI"},
    tags:["ai","systems"],
    hero:"1518770660439-4636190af475",
    metrics:[],
    sections:[
      {h:"Context", p:["Orson is an independent venture built outside any employer, exploring what AI looks like as a product rather than a feature. It is proof of building beyond the org chart: applied AI thinking, workflow design, and interface architecture taken from idea to working system."]},
      {h:"The bet", p:["Most AI products bolt a chat box onto existing software. Orson starts from the opposite end: what workflows become possible when models can interpret, recommend, and act, and what interface makes that trustworthy to a person."]},
      {h:"The work", p:["The focus is the gap between model capability and usable product: agent-based workflows, automation, decision support, and the prompt and interface architecture that turns probabilistic output into something a person can rely on and steer."]},
      {h:"Strategic impact", p:["Orson is the founder-energy proof point in the portfolio. It demonstrates AI-native product thinking developed independently, and it connects directly to the platform work: the same systems instinct, now pointed at intelligent software."]},
    ],
    note:"Placeholder to match the schema. Replace with the full Orson draft from the Claude Code project.",
    gallery:["1526374965328-7f61d4dc18c5","1488229297570-58520851e868"],
  },

  "strunk": {
    kind:"Project", type:"project", title:"Strunk",
    stand:"A microcopy management product that treats product language as infrastructure, keeping UX writing consistent across an entire platform.",
    meta:{Client:"QikServe / Access Group", Year:"2023", Sector:"Content systems"},
    tags:["brand","systems"],
    hero:"1457369804613-52c61a468e7d",
    metrics:[],
    sections:[
      {h:"Context", p:["Strunk started as an internal tool for QikServe and was later rebuilt for Access. Its job is to manage product microcopy: the labels, prompts, errors, and guidance that make an interface usable, across many products and surfaces."]},
      {h:"Problem", p:["On a platform with twenty-plus products, language drifts. The same action gets three names, errors contradict each other, and tone fragments. That drift is a real cost: it confuses guests, slows teams, and quietly erodes brand."]},
      {h:"Solution", p:["Strunk made product language a managed system rather than scattered strings. Copy could be maintained, governed, and kept consistent in one place, with the structure to scale as the platform grew."]},
      {h:"Why it matters", p:["It is a clear piece of systems thinking applied to content. Treating words as infrastructure, with governance and a single source of truth, is the same discipline as a design system, pointed at language."]},
    ],
    gallery:["1502920917128-1aa500764cbd","1483058712412-4245e9b90334"],
  },

  "why-design-systems-fail": {
    kind:"Musing", type:"musing", title:"Why most design systems fail",
    stand:"A design system is not a component library. It is an operating model, and that is exactly where most of them come apart.",
    meta:{Published:"May 2026", Sector:"Design systems"},
    tags:["systems"],
    hero:"1581291518857-4e27b48ff24e",
    metrics:[],
    sections:[
      {h:"The comforting lie", p:["The easiest way to fail at a design system is to believe you have one because you have a Figma library and a package of components. The artefacts are the visible part. They are not the system.","A design system is the set of decisions a team no longer has to make, the standards it enforces, and the speed it creates safely. When people say a system failed, they rarely mean the buttons were wrong. They mean nobody used them, or everybody forked them."]},
      {h:"Systems are behaviour, not files", p:["The value of a system is behavioural. It shows up in the decisions it prevents and the arguments it ends. If two teams still debate the same dropdown pattern every quarter, the library exists but the system does not.","This is why governance matters more than coverage. A small set of components that everyone actually adopts beats an exhaustive library that teams quietly route around."]},
      {h:"Language is part of the system", p:["Most systems stop at the visual layer and leave product language to drift. That is a mistake. The words in an interface are as load-bearing as the components, and they fragment just as fast. Treating microcopy as managed infrastructure, not decoration, is part of the same discipline."]},
      {h:"What good looks like", p:["A working system is judged by adoption, consistency under pressure, and the speed at which a new product can be built without reinventing patterns. It is maintained like a product, with owners, versioning, and a way to deprecate. If no one owns it, it is already failing, it just has not noticed yet."]},
    ],
    gallery:["1531403009284-440f080d1e12","1517292987719-0369a794ec0f"],
  },
};

/* light fallbacks for grid items without full content */
const lightHero = {
  "access-evo":"1551434678-e076c223a692","prepay-qikserve":"1554224155-6726b3ff858f",
  "access-kiosk-pocket":"1556656793-08538906a9f8","evoguest-ds":"1497366754035-f200968a6e72",
  "gdk-go-live":"1552566626-52f8b828add9","quoin":"1454165804606-c3d57bc86b40",
  "the-brotique":"1503602642458-232111445657","iamhere":"1512941937669-90a1b58e7e9c",
  "realise-offices":"1497366811353-6870744d04b2",
};

/* ---------------- home render ---------------- */
const grid = document.getElementById('grid');
function renderGrid(filter){
  grid.innerHTML='';
  let shown=0;
  works.forEach(w=>{
    const on = filter==='all' || w.f.includes(filter);
    if(on) shown++;
    const c=document.createElement('a');
    c.className='cell'+(on?'':' dim');
    c.onclick=()=>go((w.type==='project'?'work':'work')+'/'+w.slug);
    c.innerHTML=`<span class="num">${w.n}</span><span class="go">↗</span>
      <div class="t">${w.t}</div><div class="s">${w.s}</div>`;
    grid.appendChild(c);
  });
  document.getElementById('count').textContent = shown+' of '+works.length+' pieces';
}
document.querySelectorAll('#sentence .sv').forEach(v=>{
  v.onclick=()=>{
    document.querySelectorAll('#sentence .sv').forEach(x=>x.classList.remove('sel'));
    v.classList.add('sel');
    renderGrid(v.dataset.f);
  };
});

/* ---------------- detail render ---------------- */
function imgEl(id){
  const fb = 'https://picsum.photos/seed/'+encodeURIComponent(id)+'/1400/900';
  return `<img src="${UNS(id)}" alt="" loading="lazy" onerror="if(!this.dataset.fb){this.dataset.fb=1;this.src='${fb}';}">`;
}
function findWork(slug){ return works.find(w=>w.slug===slug); }

function renderDetail(slug){
  const w = findWork(slug);
  let d = content[slug];
  if(!d){
    // build a light page from the grid stub
    d = {
      kind: w && w.type==='project' ? 'Project' : 'Case study',
      type: w?w.type:'caseStudy',
      title: w?w.t:slug, stand: w?w.s:'',
      meta:{}, tags: w?w.f.filter(x=>TAGLABEL[x]):[], hero: lightHero[slug]||"1551434678-e076c223a692",
      metrics:[], sections:[{h:"Overview", p:[ (w?w.s:'')+". Full write-up in progress." ]}],
      note:"This page is a stub. The full narrative for this piece is still being written.",
      gallery:[],
    };
  }
  const tags = (d.tags||[]).map(t=>`<span class="tag">${TAGLABEL[t]||t}</span>`).join('');
  const metaHtml = Object.entries(d.meta||{}).map(([k,v])=>`<div class="m"><div class="k">${k}</div><div class="v">${v}</div></div>`).join('')
    + (tags?`<div class="m"><div class="k">Tags</div><div class="dtags">${tags}</div></div>`:'');
  const metricsHtml = (d.metrics&&d.metrics.length)
    ? `<div class="metrics">${d.metrics.map(m=>`<div class="mx"><div class="val">${m[0]}</div><div class="lab">${m[1]}</div></div>`).join('')}</div>` : '';
  const bodyHtml = (d.sections||[]).map(s=>
    `<h2>${s.h}</h2>`+s.p.map(p=>`<p>${p}</p>`).join('')
  ).join('') + (d.note?`<div class="note">${d.note}</div>`:'');
  const galleryHtml = (d.gallery&&d.gallery.length)
    ? `<div class="gallery">${d.gallery.map(g=>`<div class="g">${imgEl(g)}</div>`).join('')}</div>` : '';

  document.getElementById('crumb').textContent = (d.kind||'')+' / '+(d.title||'');
  document.getElementById('detailBody').innerHTML = `
    <header class="dhead">
      <div class="kind">${d.kind||''}</div>
      <h1>${d.title||''}</h1>
      <p class="stand">${d.stand||''}</p>
    </header>
    ${metaHtml?`<div class="dmeta">${metaHtml}</div>`:''}
    <div class="hero"><div class="frame">${d.hero?imgEl(d.hero):''}</div></div>
    ${metricsHtml}
    <div class="body">${bodyHtml}</div>
    ${galleryHtml}
    <div class="dnav"><a onclick="go('')">← Back to index</a><a onclick="go('thinking/why-design-systems-fail')">Read: Why most design systems fail →</a></div>
  `;
  window.scrollTo(0,0);
}

/* ---------------- router ---------------- */
function go(path){ location.hash = path ? '#/'+path : '#/'; }
function route(){
  const hash = location.hash.replace(/^#\/?/,''); // e.g. work/qikserve-kiosk
  const parts = hash.split('/').filter(Boolean);
  const home = document.getElementById('home');
  const detail = document.getElementById('detail');
  if(parts.length>=2 && (parts[0]==='work'||parts[0]==='thinking')){
    home.classList.add('hidden');
    detail.classList.add('show');
    renderDetail(parts[1]);
  } else {
    detail.classList.remove('show');
    home.classList.remove('hidden');
  }
}
window.addEventListener('hashchange', route);
renderGrid('all');
route();
</script>
</body>
</html>
