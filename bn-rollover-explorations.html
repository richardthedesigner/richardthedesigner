<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>B+N — Home grid rollover explorations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f7f6f2; --paper2:#eeede7; --ink:#14151a; --soft:#5b5c63; --line:#d9d7cf;
    --smalt:#1a46f0; --smalt-deep:#1438c2; --smalt-line:#3d62f4;
    --sans:'IBM Plex Sans',system-ui,sans-serif; --mono:'IBM Plex Mono',monospace; --disp:'Fraunces',serif;
  }
  *{box-sizing:border-box;margin:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}

  /* ---------- layout ---------- */
  .stage{display:grid;grid-template-columns:minmax(320px,36%) 1fr;min-height:100vh;position:relative}
  .mast{position:relative;background:var(--smalt);color:#fff;padding:28px;display:flex;flex-direction:column;overflow:hidden}
  .mast small{font-family:var(--mono);font-size:12px;letter-spacing:.05em;position:relative;z-index:2}
  .mast h1{margin-top:32px;font-size:clamp(22px,2.3vw,34px);line-height:1.18;letter-spacing:-.02em;font-weight:600;position:relative;z-index:2}
  .mast h1 .on{background:#fff;color:var(--smalt);border-radius:6px;padding:2px 10px}
  .mast h1 .off{border-bottom:2px solid rgba(255,255,255,.3)}
  .mast .slot{position:relative;z-index:2;margin-top:auto;min-height:180px;display:flex;flex-direction:column;justify-content:flex-end}
  .mast .count{position:relative;z-index:2;margin-top:16px;font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.9)}

  .grid{display:grid;grid-template-columns:repeat(3,1fr);grid-auto-rows:minmax(180px,1fr)}
  .cell{position:relative;display:flex;flex-direction:column;padding:14px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);background:var(--paper);overflow:hidden;cursor:pointer}
  .cell .kind{position:absolute;top:12px;right:14px;font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--soft);z-index:2}
  .cell .t{margin-top:auto;font-weight:600;font-size:15px;line-height:1.12;letter-spacing:-.012em;position:relative;z-index:2}
  .cell .s{margin-top:4px;font-family:var(--mono);font-size:10px;color:var(--soft);position:relative;z-index:2}
  .cell .sum{position:relative;z-index:2;font-size:12.5px;line-height:1.45;margin-top:8px;max-width:34ch;opacity:0;max-height:0;transition:opacity .25s ease,max-height .3s ease}

  /* media layers */
  .cell .img,.mast .bg,.stage .canvasbg{position:absolute;inset:0;background-size:cover;background-position:center;pointer-events:none}
  .cell .img{opacity:0;transform:scale(1);transition:opacity .25s ease,transform .6s ease}
  .cell .veil{position:absolute;inset:0;background:var(--smalt);opacity:0;mix-blend-mode:multiply;transition:opacity .25s ease;pointer-events:none}
  .mast .bg{opacity:0;mix-blend-mode:multiply;filter:saturate(.9);transform:scale(1.04);transition:opacity .35s ease,transform 1.2s cubic-bezier(.2,.7,.2,1);z-index:1}
  .stage .canvasbg{opacity:0;transition:opacity .4s ease;z-index:0}

  /* sidebar preview text */
  .slot .pv{opacity:0;transform:translateY(10px);transition:opacity .3s ease,transform .35s cubic-bezier(.2,.7,.2,1)}
  .slot .pv .pt{font-size:clamp(20px,1.8vw,28px);font-weight:600;letter-spacing:-.02em;line-height:1.1}
  .slot .pv .pk{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.85);margin-top:6px}
  .slot .pv .ps{margin-top:10px;font-size:14px;line-height:1.5;color:rgba(255,255,255,.92);max-width:36ch}
  .slot .intro{position:absolute;bottom:0;font-size:14px;line-height:1.55;color:rgba(255,255,255,.92);max-width:34ch;transition:opacity .25s ease}

  /* ---------- MODE 1: tile wash (current behaviour) ---------- */
  [data-mode="1"] .cell:hover .img{opacity:1;transform:scale(1.04)}
  [data-mode="1"] .cell:hover .veil{opacity:.78}
  [data-mode="1"] .cell:hover .t,[data-mode="1"] .cell:hover .s,[data-mode="1"] .cell:hover .kind{color:#fff}

  /* ---------- MODE 2: sidebar backdrop (your idea) ---------- */
  [data-mode="2"] .mast.live .bg{opacity:.5;transform:scale(1)}
  [data-mode="2"] .mast.live .intro{opacity:0}
  [data-mode="2"] .mast.live .pv{opacity:1;transform:none}
  [data-mode="2"] .cell:hover{background:var(--paper2)}
  [data-mode="2"] .cell:hover .t{box-shadow:inset 0 -2px 0 var(--smalt)}

  /* ---------- MODE 3: typographic summary swap (no imagery) ---------- */
  [data-mode="3"] .mast.live .intro{opacity:0}
  [data-mode="3"] .mast.live .pv{opacity:1;transform:none}
  [data-mode="3"] .pv .ps{font-family:var(--disp);font-size:clamp(17px,1.5vw,21px);line-height:1.45}
  [data-mode="3"] .cell:hover{background:var(--smalt);border-color:var(--smalt-deep)}
  [data-mode="3"] .cell:hover .t,[data-mode="3"] .cell:hover .s,[data-mode="3"] .cell:hover .kind{color:#fff}

  /* ---------- MODE 4: spotlight + in-tile summary ---------- */
  [data-mode="4"] .grid:hover .cell{opacity:.35;transition:opacity .3s ease}
  [data-mode="4"] .grid .cell:hover{opacity:1;background:var(--smalt)}
  [data-mode="4"] .cell:hover .t,[data-mode="4"] .cell:hover .s,[data-mode="4"] .cell:hover .kind{color:#fff}
  [data-mode="4"] .cell:hover .sum{opacity:1;max-height:80px;color:rgba(255,255,255,.92)}

  /* ---------- MODE 5: full-bleed canvas ---------- */
  [data-mode="5"] .gridwrap{position:relative}
  [data-mode="5"] .gridwrap.live .canvasbg{opacity:.18}
  [data-mode="5"] .cell{background:color-mix(in srgb,var(--paper) 82%,transparent)}
  [data-mode="5"] .cell:hover{background:var(--paper)}
  [data-mode="5"] .cell:hover .t{box-shadow:inset 0 -2px 0 var(--smalt)}
  [data-mode="5"] .mast.live .intro{opacity:0}
  [data-mode="5"] .mast.live .pv{opacity:1;transform:none}

  /* ---------- MODE 6: fused (2 + 4) ---------- */
  [data-mode="6"] .mast.live .bg{opacity:.5;transform:scale(1)}
  [data-mode="6"] .mast.live .intro{opacity:0}
  [data-mode="6"] .mast.live .pv{opacity:1;transform:none}
  [data-mode="6"] .grid:hover .cell{opacity:.35;transition:opacity .3s ease}
  [data-mode="6"] .grid .cell:hover{opacity:1;background:var(--smalt)}
  [data-mode="6"] .cell:hover .t,[data-mode="6"] .cell:hover .s,[data-mode="6"] .cell:hover .kind{color:#fff}
  [data-mode="6"] .cell:hover .sum{opacity:1;max-height:80px;color:rgba(255,255,255,.92)}

  /* ---------- mode switcher ---------- */
  .bar{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:50;display:flex;gap:6px;background:var(--ink);padding:8px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
  .bar button{font-family:var(--mono);font-size:11.5px;color:#fff;background:transparent;border:0;border-radius:8px;padding:8px 12px;cursor:pointer;white-space:nowrap}
  .bar button[aria-pressed="true"]{background:var(--smalt)}
  .note{position:fixed;left:50%;bottom:66px;transform:translateX(-50%);z-index:50;font-family:var(--mono);font-size:10.5px;color:var(--soft);background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:5px 10px}

  @media (prefers-reduced-motion: reduce){
    *{transition-duration:.001ms !important}
  }
  @media (max-width:900px){.stage{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body data-mode="2">

<div class="stage">
  <aside class="mast" id="mast">
    <div class="bg" id="mastbg"></div>
    <small>Richard Murphy — Product Design &amp; Platform Strategy</small>
    <h1>How I <span class="on">work</span> / <span class="off">operate</span> / <span class="off">build</span> / <span class="off">design</span> / <span class="off">transform</span> / <span class="off">craft</span>.</h1>
    <div class="slot">
      <p class="intro" id="intro">Platforms operated at global scale. Systems built to be AI-native. Years of making the thing, by hand.</p>
      <div class="pv" id="pv">
        <div class="pt" id="pvT"></div>
        <div class="pk" id="pvK"></div>
        <div class="ps" id="pvS"></div>
      </div>
    </div>
    <p class="count">27 of 27 pieces</p>
  </aside>

  <div class="gridwrap" id="gridwrap">
    <div class="canvasbg" id="canvasbg"></div>
    <section class="grid" id="grid"></section>
  </div>
</div>

<p class="note" id="note"></p>
<nav class="bar" aria-label="Rollover mode">
  <button data-m="1">1 · Tile wash</button>
  <button data-m="2">2 · Sidebar backdrop</button>
  <button data-m="3">3 · Type summary</button>
  <button data-m="4">4 · Spotlight</button>
  <button data-m="5">5 · Full-bleed</button>
  <button data-m="6">6 · Fused 2+4</button>
</nav>

<script>
const U = id => `https://images.unsplash.com/${id}?auto=format&fit=crop&w=1200&q=70`;
const WORK = [
  {t:'QikServe Kiosk', k:'Case study', s:'Hospitality technology', img:U('photo-1687969962129-dd77e13b95b7'),
   sum:'Brand-specific, accessible self-service ordering that holds up under real operational pressure in 42 countries.'},
  {t:'QikServe Online Ordering', k:'Case study', s:'Hospitality technology', img:U('photo-1601972602288-3be527b4f18a'),
   sum:'Hospitality ecommerce where brand, accessibility and menu complexity all shape conversion.'},
  {t:'Access Evo', k:'Case study', s:'Hospitality technology', img:U('photo-1493397212122-2b85dda8106b'),
   sum:'The platform design system unifying a portfolio of hospitality products into one coherent language.'},
  {t:'Orson', k:'Case study', s:'Applied AI', img:U('photo-1677442136019-21780ecad995'),
   sum:'An AI-native venture built independently, exploring what software looks like when agents do the work.'},
  {t:'The Brotique', k:'Project', s:'Personal venture', img:U('photo-1585747860715-2ba37e788b70'),
   sum:'A grooming and lifestyle commerce brand with an editorial spine, run from brand to checkout.'},
  {t:'Strunk', k:'Project', s:'QikServe / Access Group', img:U('photo-1609605348579-3123e3d40eb8'),
   sum:'A microcopy management product that treats product language as infrastructure.'},
  {t:'Access EvoGuest', k:'Case study', s:'Hospitality technology', img:U('photo-1483366774565-c783b9f70e2c'),
   sum:'The platform design system extended into the guest-facing estate, where conversion pressure lives.'},
  {t:'Prepay × QikServe', k:'Case study', s:'Hospitality technology', img:U('photo-1524351543168-8e38787614e9'),
   sum:'Two ordering platforms fused into one after a merger, without dropping a single live customer.'},
  {t:'Quoin', k:'Case study', s:'Advisory', img:U('photo-1497366216548-37526070297c'),
   sum:'Independent systems and strategy advisory: the platform discipline, applied to other people’s problems.'},
];

const NOTES = {
  1:'Current behaviour: image + smalt wash inside the tile.',
  2:'Your idea: tiles stay typographic; the blue-washed image floods the sidebar, title + standfirst replace the intro.',
  3:'No imagery at all: hovered tile goes smalt; sidebar swaps to a Fraunces standfirst. Fastest, most editorial.',
  4:'Everything else recedes; summary expands inside the hovered tile. Sidebar untouched.',
  5:'Image washes the whole grid behind translucent tiles; sidebar shows the text preview. Most cinematic, most risk.',
  6:'Fused: sidebar floods with the blue-washed image + standfirst, the grid recedes, and the hovered tile goes smalt with its summary inside.',
};

const grid = document.getElementById('grid');
WORK.forEach(w => {
  const c = document.createElement('a');
  c.className = 'cell'; c.href = '#'; c.onclick = e => e.preventDefault();
  c.innerHTML = `
    <div class="img" style="background-image:url('${w.img}')"></div>
    <div class="veil"></div>
    <span class="kind">${w.k}</span>
    <span class="t">${w.t}</span>
    <span class="sum">${w.sum}</span>
    <span class="s">${w.s}</span>`;
  c.addEventListener('mouseenter', () => preview(w));
  c.addEventListener('focus', () => preview(w));
  c.addEventListener('mouseleave', clear);
  c.addEventListener('blur', clear);
  grid.appendChild(c);
});

const mast = document.getElementById('mast'), mastbg = document.getElementById('mastbg'),
      canvasbg = document.getElementById('canvasbg'), gridwrap = document.getElementById('gridwrap'),
      pvT = document.getElementById('pvT'), pvK = document.getElementById('pvK'), pvS = document.getElementById('pvS');

function preview(w){
  pvT.textContent = w.t; pvK.textContent = `${w.k} · ${w.s}`; pvS.textContent = w.sum;
  mastbg.style.backgroundImage = `url('${w.img}')`;
  canvasbg.style.backgroundImage = `url('${w.img}')`;
  mast.classList.add('live'); gridwrap.classList.add('live');
}
function clear(){ mast.classList.remove('live'); gridwrap.classList.remove('live'); }

const note = document.getElementById('note');
function setMode(m){
  document.body.dataset.mode = m; note.textContent = NOTES[m]; clear();
  document.querySelectorAll('.bar button').forEach(b => b.setAttribute('aria-pressed', b.dataset.m === String(m)));
}
document.querySelectorAll('.bar button').forEach(b => b.addEventListener('click', () => setMode(b.dataset.m)));
document.addEventListener('keydown', e => { if (e.key >= '1' && e.key <= '6') setMode(e.key); });
setMode(6);
</script>
</body>
</html>
