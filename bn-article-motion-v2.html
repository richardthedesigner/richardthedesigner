  .scrtop{background:var(--smalt);color:#fff;padding:46px 18px 14px;font-weight:600;font-size:15px}

  .scrbody{flex:1;padding:14px;overflow:hidden;background:#fff}
  .item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #eee;font-size:13.5px}
  .item .pr{color:var(--smalt);font-weight:600}
  .pill{display:inline-block;border:1px solid var(--smalt);color:var(--smalt);border-radius:999px;font-size:11px;padding:3px 10px;margin:4px 4px 0 0;font-family:"IBM Plex Mono",monospace}
  .pill.sel{background:var(--smalt);color:#fff}
  .bigbtn{margin-top:auto;background:var(--smalt);color:#fff;text-align:center;padding:13px;border-radius:12px;font-weight:600;font-size:14px;margin:12px}
  .doneScr{align-items:center;justify-content:center;text-align:center;color:var(--ink);gap:8px}
  .doneScr .tick{width:64px;height:64px;border-radius:50%;background:var(--smalt);color:#fff;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 10px}
  .pcontrols{display:flex;gap:8px;align-items:center}
  .pcontrols button{font-family:"IBM Plex Mono",monospace;font-size:12px;border:1px solid var(--line);background:none;border-radius:999px;padding:7px 14px;cursor:pointer;color:var(--ink)}
  .pcontrols button:hover{border-color:var(--smalt);color:var(--smalt)}
  .pdots{display:flex;gap:6px}.pdot{width:7px;height:7px;border-radius:50%;background:var(--line)}.pdot.on{background:var(--smalt)}
  .openproto{font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--smalt);border:1px solid var(--smalt);border-radius:999px;padding:8px 16px;cursor:pointer;text-decoration:none}

  @media(max-width:900px){
    .home,.article{grid-template-columns:1fr}.mast,.arail{position:static;height:auto}
    .grid{grid-template-columns:repeat(2,1fr)}
    .scrolly{grid-template-columns:1fr}.scrolly .stage{display:none}
    .brief .gal .g{grid-column:span 12 !important;aspect-ratio:16/9 !important}
    .proto .stage{grid-template-columns:1fr}
  }
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.reveal{opacity:1;transform:none}}
</style>

const works=[
  {n:"01",t:"Access Evo",slug:"access-evo",s:"Platform design system",f:["platform","systems"],img:"1551434678-e076c223a692",shape:"long",kind:"Case study"},
  {n:"02",t:"QikServe Kiosk",slug:"qikserve-kiosk",s:"Self-service at scale",f:["platform","systems"],img:"1414235077428-338989a2e8c0",shape:"long",kind:"Case study"},
  {n:"03",t:"Prepay × QikServe",slug:"prepay-qikserve",s:"Post-merger fusion",f:["platform"],img:"1554224155-6726b3ff858f",shape:"long",kind:"Case study"},
  {n:"04",t:"Access Kiosk Pocket",slug:"access-kiosk-pocket",s:"Kiosk in your hand",f:["platform","ai"],img:"1556656793-08538906a9f8",shape:"proto",kind:"Prototype"},
  {n:"05",t:"EvoGuest DS",slug:"evoguest-ds",s:"Hospitality system",f:["systems"],img:"1497366754035-f200968a6e72",shape:"long",kind:"Case study"},
  {n:"06",t:"Orson",slug:"orson",s:"AI-native venture",f:["ai","systems"],img:"1518770660439-4636190af475",shape:"brief",kind:"Project"},
  {n:"07",t:"GDK Go-Live",slug:"gdk-go-live",s:"Estate-wide rollout",f:["platform"],img:"1552566626-52f8b828add9",shape:"brief",kind:"Project"},
  {n:"08",t:"Quoin",slug:"quoin",s:"Systems advisory",f:["systems"],img:"1454165804606-c3d57bc86b40",shape:"brief",kind:"Project"},
  {n:"09",t:"The Brotique",slug:"the-brotique",s:"Commerce & editorial",f:["brand","ai"],img:"1503602642458-232111445657",shape:"brief",kind:"Project"},
  {n:"10",t:"Strunk",slug:"strunk",s:"Editorial system",f:["brand","systems"],img:"1457369804613-52c61a468e7d",shape:"long",kind:"Project"},
  {n:"11",t:"iAmHere",slug:"iamhere",s:"Presence, reimagined",f:["ai","brand"],img:"1512941937669-90a1b58e7e9c",shape:"brief",kind:"Project"},
  {n:"12",t:"Realise Offices",slug:"realise-offices",s:"Spatial brand system",f:["brand"],img:"1497366811353-6870744d04b2",shape:"brief",kind:"Project"},
  {n:"13",t:"Project 105",slug:"project-105",s:"A car, by hand",f:["muse"],img:"1503376780353-7e6692767b70",shape:"muse",kind:"Muse"},
];
const TAGLABEL={platform:"Run platforms",ai:"Build with AI",systems:"Make systems",brand:"Shape brands"};

const content={
  "qikserve-kiosk":{
    lede:"Self-service ordering built for high-volume hospitality, designed to feel brand-specific, stay accessible, and hold up under real operational pressure at global scale.",
    metrics:[{pre:"",val:8000,post:"+",lab:"locations",fmt:1},{pre:"",val:42,post:"",lab:"countries"},{pre:"",val:130,post:"+",lab:"integrations"},{pre:"$",val:1,post:"bn+",lab:"value handled"}],
    steps:[
      {n:"01",h:"Context",p:[
        "QikServe builds the self-service ordering layer for hospitality, and the kiosk is the most demanding surface in that estate. A single product is deployed across more than eight thousand venues, dozens of brands and forty-two countries, each carrying its own menu logic, payment configuration, tax rules and operational habits.",
        "The constant is the codebase. The same kiosk has to behave correctly for a global coffee chain with a strict brand system and for an independent operator who set everything up themselves an hour before opening. That tension, one product against radically different contexts, shaped every decision that followed."
      ],img:"1414235077428-338989a2e8c0",cap:"One product, many brands"},
      {n:"02",h:"The trust burden",p:[
        "A kiosk does things a website never has to. It takes payment, presents allergen and dietary information, verifies age for alcohol, and handles every edge of a real transaction with no member of staff standing next to it.",
        "That removes the safety net. When a person hesitates at a counter, someone helps them. At a kiosk, hesitation becomes a stalled order and a queue building behind the screen. The interface has to carry the confidence a member of staff usually provides."
      ],img:"1559339352-11d035aa65de",cap:"Confidence without staff"},
      {n:"03",h:"Why white-label usually fails",p:[
        "White-label kiosks tend to collapse in one of two directions. They flatten into a generic template so neutral that no brand wants its name on it, or they fork into bespoke builds for every customer until the whole thing is unmaintainable.",
        "Neither scales. The first loses the commercial reason a brand pays for the product; the second destroys the margin that makes the product viable. The real brief was to find the structure that avoids both."
      ],img:"1517248135467-4c7edcad34c4",cap:"Between generic and bespoke"},
      {n:"04",h:"Constraints as material",p:[
        "Every decision had to survive contact with operations: legacy POS integrations, peripheral hardware, intermittent connectivity, and regional accessibility legislation that is not optional.",
        "Accessibility in particular was treated as a hard input, not a finishing pass. A kiosk is a physical and digital product at once, so reach, contrast, focus order, timeout behaviour and error recovery all had to meet ADA and WCAG expectations from the start. Designing for that first tends to make the product better for everyone."
      ],img:"1551218808-94e220e084d2",cap:"Accessibility as a starting point"},
      {n:"05",h:"The structural model",p:[
        "The answer was to stop treating the kiosk as a screen and start treating it as a system of configurable behaviours. Menu architecture, modifiers, basket logic, payment, loyalty, tipping, charity donation, age verification and attract screens were each modelled as components an operator could enable, restyle and arrange without touching code.",
        "Brand expression was scoped deliberately. Operators control styling, imagery and tone inside a structure that guarantees the journey still works. The system flexes on the surface and holds firm on the flow. That single principle is what let one product feel like many."
      ],img:"1556742502-ec7c0e9f34b1",cap:"Configurable, not bespoke"},
      {n:"06",h:"The hard cases",p:[
        "The difference between a demo and a product is the edge cases, so they were designed as first-class patterns rather than exceptions. Coffee customisation with deep modifier trees, pizza builds, alcohol age-gates, tipping prompts and charity round-ups each had a defined behaviour.",
        "Because each was a pattern, adding one to a deployment did not destabilise the rest. An operator could switch on tipping or alcohol verification and trust that the journey around it still held."
      ],img:"1541167760496-1628856ab772",cap:"Edge cases as patterns"},
      {n:"07",h:"Outcome",p:[
        "The kiosk became the flagship surface of a platform running across more than eight thousand locations and forty-two countries, deployed by major global brands alongside independents from one configurable base.",
        "Accessibility leadership on the kiosk raised the standard across the wider product estate, turning participation into a default rather than a retrofit."
      ],img:"1504674900247-0877df9cc836",cap:"Deployed at global scale"},

    quote:"White-label does not have to mean generic.",
    full:"1521017432531-fbd92d768814",
    close:"A well-structured system let QikServe sell brand-specific experiences at scale without taking on bespoke maintenance. That is a commercial position as much as a design one, and it is the through-line of everything I do: structure first, so the surface is free to change."

function lightLong(w){return {lede:w.s+".", metrics:[], steps:[{n:"01",h:"Overview",p:[w.s+". Full write-up in progress."],img:w.img,cap:""}], quote:"", full:w.img, close:"More on this piece soon."};}
function lightBrief(w){return {lede:w.s+".", gallery:[w.img,"1551434678-e076c223a692","1497366754035-f200968a6e72"], facts:{Status:"In progress"}, close:"More on this piece soon."};}

let state={view:"index",slug:null,filter:"all"};
const app=document.getElementById('app');
const findWork=s=>works.find(w=>w.slug===s);
const idxOf=s=>works.findIndex(w=>w.slug===s);

/* ---------- INDEX ---------- */
function renderIndex(){
  let shown=0;
  const cells=works.map(w=>{const on=state.filter==='all'||w.f.includes(state.filter);if(on)shown++;
    return `<a class="cell${on?'':' dim'}" data-img="${w.img}" data-t="${w.t}" data-s="${w.s}" onclick="open_('${w.slug}')">
      <div class="media">${imgTag(w.img)}</div><span class="num">${w.n}</span><span class="kindtag">${w.kind}</span><div class="t">${w.t}</div><div class="s">${w.s}</div></a>`;}).join('');
  const v=(f,l)=>`<span class="sv${state.filter===f?' sel':''}" onclick="event.stopPropagation();setFilter('${f}')">${l}</span>`;
  app.innerHTML=`<div class="home" id="home">
    <aside class="mast">
      <div class="logo">Richard Murphy</div>
      <div class="sentence"><span class="lead">Show me how I </span>${v('all','work')}<span class="slash">/</span>${v('platform','run platforms')}<span class="slash">/</span>${v('ai','build with AI')}<span class="slash">/</span>${v('systems','make systems')}<span class="slash">/</span>${v('brand','shape brands')}<span class="lead">.</span></div>
      <div class="preview">
        <div class="pframe" id="pframe"><img id="pimg" alt=""></div>
        <div class="pcap" id="pcap"><div class="pt" id="pt"></div><div class="ps" id="ps"></div></div>
        <div class="blurb">Platforms operated at global scale. Systems built to be AI-native. Twelve years of making the thing, by hand.</div>
      </div>
      <div class="foot"><span style="color:#fff">${shown} of ${works.length} pieces</span><span>richardthedesigner.com</span></div>
    </aside>
    <section class="grid">${cells}</section>
  </div>`;
  const home=document.getElementById('home'),pframe=document.getElementById('pframe'),pimg=document.getElementById('pimg'),pcap=document.getElementById('pcap'),pt=document.getElementById('pt'),ps=document.getElementById('ps');
  document.querySelectorAll('.cell').forEach(c=>{
    c.addEventListener('mouseenter',()=>{const id=c.dataset.img;home.classList.add('hovering');pimg.src=UNS(id);pimg.onerror=()=>{if(!pimg.dataset.fb){pimg.dataset.fb=1;pimg.src=FB(id);}};pt.textContent=c.dataset.t;ps.textContent=c.dataset.s;pframe.classList.add('show');pcap.classList.add('show');});
    c.addEventListener('mouseleave',()=>{home.classList.remove('hovering');pframe.classList.remove('show');pcap.classList.remove('show');});
  });
}

function railHTML(w){
  const i=idxOf(w.slug),prev=works[i-1],next=works[i+1];
  const tags=(w.f||[]).filter(x=>TAGLABEL[x]).map(x=>`<span class="tg">${TAGLABEL[x]}</span>`).join('');
  return `<aside class="arail">
    <a class="back" onclick="reset_()">← Index</a>
    <div class="bignum">${w.n}</div><div class="ct">${w.t}</div><div class="cs">${w.s}</div><div class="tags">${tags}</div>
    <div class="pn"><a class="${prev?'':'disabled'}" onclick="${prev?`open_('${prev.slug}')`:''}">← prev</a><a class="${next?'':'disabled'}" onclick="${next?`open_('${next.slug}')`:''}">next →</a></div>
  </aside>`;
}

function renderLong(w){
  const d=content[w.slug]||lightLong(w);
  const metrics=d.metrics.length?`<div class="ametrics reveal">${d.metrics.map(m=>`<div class="mx"><div class="val" data-pre="${m.pre}" data-val="${m.val}" data-post="${m.post}" data-fmt="${m.fmt||0}">${m.pre}0${m.post}</div><div class="lab">${m.lab}</div></div>`).join('')}</div>`:'';
  const layers=d.steps.map((s,i)=>`<div class="layer${i===0?' on':''}" data-i="${i}">${imgTag(s.img)}<div class="scap">${s.cap||''}</div></div>`).join('');
  const steps=d.steps.map((s,i)=>`<div class="step" data-i="${i}"><div class="sn">${s.n}</div><h2>${s.h}</h2>${s.p.map(p=>`<p>${p}</p>`).join('')}</div>`).join('');
  app.innerHTML=`<div class="article">${railHTML(w)}<div class="canvas">
    <div class="ahero"><div class="bg">${imgTag(w.img)}</div><div class="lede"><div class="k">${w.kind}</div><h1>${w.t}</h1><p>${d.lede}</p></div></div>
    ${metrics}
    <div class="scrolly"><div class="steps">${steps}</div><div class="stage" id="stage">${layers}</div></div>
    ${d.quote?`<div class="quote reveal"><div class="q">${d.quote}</div></div>`:''}
    ${d.full?`<div class="fullband reveal">${imgTag(d.full)}</div>`:''}
    <div class="closer reveal"><p>${d.close}</p></div>
  </div></div>`;
  initMotion(); initScrolly();
}
function renderBrief(w){
  const d=content[w.slug]||lightBrief(w);const g=d.gallery||[];
  const facts=Object.entries(d.facts||{}).map(([k,v])=>`<div>${k}<b>${v}</b></div>`).join('');
  app.innerHTML=`<div class="article">${railHTML(w)}<div class="canvas brief">
    <div class="ahero"><div class="bg">${imgTag(w.img)}</div><div class="lede"><div class="k">${w.kind}</div><h1>${w.t}</h1></div></div>
    <p class="lead reveal">${d.lede}</p>
    <div class="gal"><div class="g a reveal">${g[0]?imgTag(g[0]):''}</div><div class="g b reveal">${g[1]?imgTag(g[1]):''}</div><div class="g c reveal">${g[2]?imgTag(g[2]):''}</div><div class="g d reveal">${g[3]?imgTag(g[3]):''}</div></div>
    <div class="facts reveal">${facts}</div>
    <div class="closer reveal"><p>${d.close}</p></div>
  </div></div>`;
  initMotion();
}
function renderMuse(w){
  const d=content[w.slug];
  let html='';
  d.paras.forEach(b=>{
    if(b.pq) html+=`<p class="pq">${b.pq}</p>`;
    else if(b.fig) html+=`<figure class="wide reveal"><div class="fr">${imgTag(b.fig)}</div><figcaption>${b.cap||''}</figcaption></figure>`;
    else html+=`<p${b.first?' class="first"':''}>${b.t}</p>`;
  });
  app.innerHTML=`<div class="article">${railHTML(w)}<div class="canvas muse">
    <div class="mhero"><div class="bg">${imgTag(d.hero)}</div><div class="cap"><div class="k">Muse · personal</div><h1>${w.t}</h1></div></div>
    <div class="byline">${d.byline}</div>
    <div class="essay">${html}</div>
    <div class="mclose">${d.close}　※</div>
  </div></div>`;
  initMotion();
}
function renderProto(w){
  const d=content[w.slug];
  const screens=d.screens.map((s,i)=>{
    const body = s.done ? `<div class="scrbody doneScr">${s.body}</div>` : `<div class="scrbody">${s.body}</div>${s.btn?`<div class="bigbtn" onclick="protoNext()">${s.btn}</div>`:''}`;
    const top = s.done ? '' : `<div class="scrtop">${s.top[0]}<small>${s.top[1]||''}</small></div>`;
    return `<div class="scr${i===0?' on':''}" data-i="${i}">${top}${body}</div>`;
  }).join('');
  const dots=d.screens.map((s,i)=>`<span class="pdot${i===0?' on':''}" data-i="${i}"></span>`).join('');
  const notes=d.notes.map(n=>`<h3>${n.h}</h3>${n.p.map(p=>`<p>${p}</p>`).join('')}`).join('');
  app.innerHTML=`<div class="article">${railHTML(w)}<div class="canvas proto">
    <div class="ahero"><div class="bg">${imgTag(w.img)}</div><div class="lede"><div class="k">${w.kind}</div><h1>${w.t}</h1></div></div>
    <p class="intro reveal">${d.lede}</p>
    <div class="stage">
      <div class="notes reveal">${notes}</div>
      <div class="deviceWrap">
        <div class="device"><div class="notch"></div><div class="screen" id="screen">${screens}</div></div>
        <div class="pcontrols"><button onclick="protoPrev()">‹ Back</button><div class="pdots" id="pdots">${dots}</div><button onclick="protoNext()">Next ›</button></div>
        <a class="openproto">▶ Open full prototype</a>
      </div>
    </div>
    <div class="closer reveal"><p>${d.close}</p></div>
  </div></div>`;
  initMotion();
  window.__proto={i:0,n:d.screens.length};
}
let __proto={i:0,n:0};
function protoGo(i){const scr=document.getElementById('screen');if(!scr)return;const n=window.__proto.n;i=(i+n)%n;window.__proto.i=i;
  scr.querySelectorAll('.scr').forEach(s=>s.classList.toggle('on',+s.dataset.i===i));
  document.querySelectorAll('#pdots .pdot').forEach(d=>d.classList.toggle('on',+d.dataset.i===i));}
function protoNext(){protoGo(window.__proto.i+1);}
function protoPrev(){protoGo(window.__proto.i-1);}

function initMotion(){
  const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');if(e.target.classList.contains('ametrics'))countUp(e.target);io.unobserve(e.target);}}),{rootMargin:'0px 0px -12% 0px'});
  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));window.scrollTo(0,0);
}
function countUp(band){band.querySelectorAll('.val').forEach(el=>{const pre=el.dataset.pre,post=el.dataset.post,target=+el.dataset.val,fmt=el.dataset.fmt==='1';const dur=900,t0=performance.now();
  function step(t){const k=Math.min(1,(t-t0)/dur);const e=1-Math.pow(1-k,3);let n=Math.round(target*e);el.textContent=pre+(fmt?n.toLocaleString('en-GB'):n)+post;if(k<1)requestAnimationFrame(step);}requestAnimationFrame(step);});}
function initScrolly(){const stage=document.getElementById('stage');if(!stage)return;const layers=[...stage.querySelectorAll('.layer')];
  const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){const i=+e.target.dataset.i;layers.forEach(l=>l.classList.toggle('on',+l.dataset.i===i));}}),{rootMargin:'-45% 0px -45% 0px'});
  document.querySelectorAll('.scrolly .step').forEach(s=>io.observe(s));}

function render(){
  if(state.view==='article'){const w=findWork(state.slug);
    ({long:renderLong,brief:renderBrief,muse:renderMuse,proto:renderProto}[w.shape]||renderLong)(w);
  } else renderIndex();
}
function setFilter(f){state.filter=f;render();}
function open_(slug){state.slug=slug;state.view='article';render();}
function reset_(){state.view='index';state.slug=null;render();}
render();
</script>
